<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Spirit Pocket</title>

<style>

body{
background-image:url("17805296327137108206079971414293.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

height:100vh;
margin:0;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial;
}

.hero{

background:rgba(0,0,0,0.45);

padding:30px;

border-radius:20px;

text-align:center;

width:80%;
max-width:500px;
}

h1{

color:#f5d76e;

font-size:48px;

font-weight:bold;

text-shadow:
3px 3px 0 black,
6px 6px 10px black;

margin-top:0;
}

p{

color:white;

font-size:18px;

text-shadow:2px 2px 5px black;
}

input{

width:80%;

padding:12px;

font-size:18px;

border:none;

border-radius:10px;

margin-top:10px;
}

button{

padding:12px 20px;

font-size:18px;

border:none;

border-radius:10px;

margin-top:10px;

cursor:pointer;
}

</style>

</head>

<body>

<div class="hero">

<h1>🍸 Học rượu quán Chapter 28</h1>

<p>Chào mừng Pazjval!</p>

<p>Nhập tên loại rượu để tra cứu.</p>

<input
id="searchBox"
type="text"
placeholder="Ví dụ: Campari">

<br>

<button onclick="searchDrink()">
Tìm kiếm
</button>

</div>

<script>

function searchDrink(){

let keyword =
document
.getElementById("searchBox")
.value
.toLowerCase();

if(keyword=="campari"){

window.location.href=
"campari.html";

}

else{

alert("Chưa có dữ liệu về loại rượu này");

}

}

</script>

</body>

</html>
