<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spirit Pocket</title>

<style>

body{
margin:0;
padding:0;
height:100vh;

background-image:url("17805296327137108206079971414293.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;

font-family:Arial,sans-serif;
color:white;
text-align:center;
}

.overlay{
background:rgba(0,0,0,0.45);
min-height:100vh;
padding-top:80px;
}

h1{
font-size:50px;
text-shadow:3px 3px 10px black;
margin-bottom:10px;
}

p{
font-size:22px;
text-shadow:2px 2px 6px black;
}

.search-box{
margin:30px auto;
width:80%;
max-width:500px;
}

input{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
margin-top:10px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>

<script>

function searchBaseSpirit(){

let value =
document.getElementById("baseSpirit").value.toLowerCase();

const pages = {

"jim beam":"Jimbeam.html",
"jack daniels":"Jackdaniels.html",
"wild turkey 101":"Wildturkey101.html",
"maker mark":"Makermark.html",
"bullet rye":"Bulletrye.html",

"glenlivet":"Glenlivet.html",
"drambuie":"Drambuie.html",
"chivas regal 12":"Chivas.html",
"teacher":"Teacher.html",
"johnnie walker double black":"Doubleblack.html",
"the ileach":"Theileach.html",

"jameson":"Jameson.html",
"bailey":"Bailey.html",

"suntory":"Suntory.html",

"gordon":"Gordon.html",
"tanqueray":"Tanqueray.html",
"roku":"Roku.html",
"hendrick":"Hendrick.html",

"bacardi white":"Barcadiwhite.html",
"havana club":"Havana.html",
"captain morgan dark":"Darkrum.html",

"absolut":"Absolut.html",
"tito":"Tito.html",

"sauza":"Sauza.html",
"jose cuervo":"Jose.html",
"don julio":"Donjulio.html",

"martell":"Martell.html"

};

if(pages[value]){
window.location.href=pages[value];
}else{
alert("Không tìm thấy chai rượu");
}

}

function searchLiqueur(){

let value =
document.getElementById("liqueur").value.toLowerCase();

const pages = {

"campari":"campari.html",
"midori":"Midori.html",
"cointreau":"Cointreau.html",
"amaretto":"Amaretto.html",
"ricard":"Ricard.html",

"chartreuse":"ChartreuseGreen.html",
"absinthe":"Absinthe.html",
"creme de violet":"Creamdeviolet.html",
"creme de maraschino":"Creamdemaraschino.html",
"creme de cacao":"Creamdecacao.html",

"kalua":"Kalua.html",
"benedictine":"Benedictine.html",
"malibu":"Malibu.html",
"cherry brandy":"Cherrybrandy.html",
"blue curacao":"Bluecuracao.html",
"strawberry":"Strawberry.html",

"drambuie":"Drambuie.html",
"bailey":"Bailey.html"

};

if(pages[value]){
window.location.href=pages[value];
}else{
alert("Không tìm thấy chai rượu");
}

}

</script>

</head>

<body>

<div class="overlay">

<h1>🍸 Spirit Pocket</h1>

<p>Học rượu quán Chapter 28</p>

<div class="search-box">

<h2>Rượu nền</h2>

<input
list="baseSpirits"
id="baseSpirit"
placeholder="Tìm rượu nền...">

<datalist id="baseSpirits">

<option value="Jim Beam">
<option value="Jack Daniels">
<option value="Wild Turkey 101">
<option value="Maker Mark">
<option value="Bullet Rye">

<option value="Glenlivet">
<option value="Drambuie">
<option value="Chivas Regal 12">
<option value="Teacher">
<option value="Johnnie Walker Double Black">
<option value="The Ileach">

<option value="Jameson">
<option value="Suntory">

<option value="Gordon">
<option value="Tanqueray">
<option value="Roku">
<option value="Hendrick">

<option value="Bacardi White">
<option value="Havana Club">
<option value="Captain Morgan Dark">

<option value="Absolut">
<option value="Tito">

<option value="Sauza">
<option value="Jose Cuervo">
<option value="Don Julio">

<option value="Martell">

</datalist>

<button onclick="searchBaseSpirit()">
Tìm kiếm
</button>

</div>

<div class="search-box">

<h2>Rượu mùi</h2>

<input
list="liqueurs"
id="liqueur"
placeholder="Tìm rượu mùi...">

<datalist id="liqueurs">

<option value="Campari">
<option value="Midori">
<option value="Cointreau">
<option value="Amaretto">
<option value="Ricard">

<option value="Chartreuse">
<option value="Absinthe">

<option value="Creme de Violet">

<option value="Creme de Cacao">

<option value="Kalua">
<option value="Benedictine">
<option value="Malibu">

<option value="Cherry Brandy">
<option value="Blue Curacao">
<option value="Strawberry">

<option value="Bailey">

</datalist>

<button onclick="searchLiqueur()">
Tìm kiếm
</button>

</div>

</div>

</body>
</html>
